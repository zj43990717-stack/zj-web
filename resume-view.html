<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>张晶｜个人简历</title>
    <style>
      :root {
        --bg: #f5f6fb;
        --black: #050505;
        --yellow: #ffc42d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--black);
        font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .resume-page {
        min-height: 100vh;
        padding: 28px 18px 40px;
      }

      .resume-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        width: min(100%, 1100px);
        margin: 0 auto 22px;
        padding: 16px 20px;
        border: 4px solid var(--black);
        border-radius: 22px;
        background: #fff;
        box-shadow: 8px 8px 0 var(--black);
      }

      .resume-bar h1 {
        margin: 0;
        font-size: clamp(20px, 3vw, 30px);
      }

      .resume-link {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 4px solid var(--black);
        border-radius: 16px;
        background: var(--yellow);
        color: var(--black);
        font-size: 15px;
        font-weight: 900;
        text-decoration: none;
        box-shadow: 6px 6px 0 var(--black);
      }

      .resume-frame {
        width: min(100%, 1100px);
        margin: 0 auto;
        padding: 14px;
        border: 4px solid var(--black);
        border-radius: 28px;
        background: #fff;
        box-shadow: 10px 10px 0 var(--black);
      }

      .resume-frame img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 18px;
      }

      @media (max-width: 700px) {
        .resume-bar {
          flex-direction: column;
          align-items: stretch;
        }

        .resume-link {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="resume-page">
      <div class="resume-bar">
        <h1>张晶个人简历</h1>
        <a class="resume-link" href="assets/简历2026.6.22.png" download="简历2026.6.22.png">下载图片</a>
      </div>
      <div class="resume-frame">
        <img src="assets/简历2026.6.22.png" alt="张晶个人简历">
      </div>
    </main>
  </body>
</html>
